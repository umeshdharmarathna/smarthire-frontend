<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hire - My Bookings</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>


        <!-- Background Shapes -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>
    <div class="bg-shape shape4"></div>
    <div class="bg-shape shape5"></div>






    <nav class="navbar">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Smart Hire</a></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="services.html">Browse Services</a>
            <a href="#" id="logout-btn" class="btn-outline">Logout</a>
        </div>
    </nav>

    <main class="container">
        <h2>Manage Bookings</h2>
        <div class="bookings-list" id="bookings-container">
            <p>Loading your bookings...</p>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/bookings.js"></script>
    <script>
        // FIX: page එකට ඇතුල් වෙනකොටම token එකක් නැත්නම් login page එකට යවනවා
        // (කලින් token check එකක්ම නෑ - bookings.js එකේ පණිවිඩයක් පෙන්නුවත්
        // logged-out කෙනෙක්ට page එකම access කරන්න පුළුවන් තිබ්බා)
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('token')) {
                alert('Please login to view your bookings.');
                window.location.href = 'login.html';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
